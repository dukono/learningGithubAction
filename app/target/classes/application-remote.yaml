
application:
  ia:
    providers:
      - name: groq/llama-3.3
        as-default: true
        type: groq
        base-url: https://api.groq.com/openai
        api-key: ${GROQ_API_KEY:}
        model: llama-3.3-70b-versatile
        temperature: 0.2
        max-tokens: 5000
      - name: groq/qwen3-32b
        type: groq
        base-url: https://api.groq.com/openai
        api-key: ${GROQ_API_KEY:}
        model: qwen/qwen3-32b
        temperature: 0.2
        max-tokens: 5000
      - name: google/gemini-3-flash-preview
        type: google
        base-url: https://api.groq.com/openai
        api-key: ${GEMINI_API_KEY:}
        model: gemini-3-flash-preview
        temperature: 0.2
        max-tokens: 5000
      - name: google/gemini-2.5-pro
        type: google
        base-url: https://api.groq.com/openai
        api-key: ${GEMINI_API_KEY:}
        model: gemini-2.5-pro
        temperature: 0.2
        max-tokens: 5000

spring:
  docker:
    compose:
      enabled: true
      lifecycle-management: start_only
