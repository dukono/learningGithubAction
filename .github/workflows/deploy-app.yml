name: CI/CD Maven - App
on:
  push:
    branches: [main]
    paths:
      - app/**
      - .github/workflows/deploy-app.yml
env:
  NAME: "app"
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      DEPLOY_TAG: ${{ steps.deploy-tag.outputs.DEPLOY_TAG }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Preparar nombre de repositorio en minúsculas
        id: deploy-tag
        run: |
          echo "DEPLOY_TAG=ghcr.io/${GITHUB_REPOSITORY@L}-${{ env.NAME }}:${{ github.sha }}" >> ${GITHUB_ENV}
          echo "DEPLOY_TAG=ghcr.io/${GITHUB_REPOSITORY@L}-${{ env.NAME }}:${{ github.sha }}" >> ${GITHUB_OUTPUT}
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build y test
        run: |
          cd app
          mvn -B package

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v7
        with:
          file: app/dockerfile
          context: app
          push: true
          tags: ${{ env.DEPLOY_TAG }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy en Northflank
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ secrets.NORTHFLANK_SERVICE_ID }}
          image-path: ${{ needs.build.outputs.DEPLOY_TAG }}
          credentials-id: ${{ secrets.NORTHFLANK_CREDENTIALS_ID }}
