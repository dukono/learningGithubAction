name: Read branch info
on: 
  pull_request: 
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    
jobs:
  show-branch-info:
    runs-on: ubuntu-latest
    steps:
      - name: get-all-info
        id: getter
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          echo "github.ref": "${{github.ref}}"
          echo "github.sha": "${{github.sha}}"
          echo "github.repository": "${{github.repository}}"
          echo "github.event.after": "${{github.event.after}}" 
          echo "github.event.before": "${{github.event.before}}"
          echo "github.event.compare": "${{github.event.compare}}"
          echo "github.event.created": "${{github.event.created}}"
          echo "github.event.deleted": "${{github.event.deleted}}"
          echo "github.event.forced": "${{github.event.forced}}"
          echo "github.event.ref": "${{github.event.ref}}"
          echo "github.actor": "${{github.actor}}
          echo "github.triggering_actor": "${{github.triggering_actor}}
          echo "github.repository_owner": "${{github.repository_owner}}
          echo "github.workspace": "${{github.workspace}}
          echo "ref=${{github.ref}}" >> $GITHUB_ENV
          echo "current=${{github.sha}}" >> $GITHUB_ENV
          echo "after=${{github.event.after}}" >> $GITHUB_ENV
          echo "before=${{github.event.before}}" >> $GITHUB_ENV
      - name: git-config
        run: |
          git config --global alias.l "log --graph --format=\"%C(yellow)%h%C(reset) - %C(cyan)%ad%C(reset) - %C(green)%<(15,trunc)%an%C(reset) - %s\" --date=local --date=format:\"%d-%m-%Y %H:%M\""
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/dukono/learningGithubAction.git .
          git fetch origin ${before}
          git fetch origin ${after}
          git fetch origin ${{ github.ref }}
          git checkout ${{ github.sha }}
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
      - name: commit-comparator
        run: |
          echo "'current'": $current
          echo "'after'": $after
          echo "'before'": $before
          c=$(git l ${current} -10)
          b=$(git l ${before} -10)
          a=$(git l ${after} -10)
          ab=$(git l ${before}..${after} -10)
          
          echo "-------------------"
          echo ">>current<<<: $current"
          echo "$c"
          echo "-------------------"
          echo ">>after<<: $after"
          echo "$a"
          echo "-------------------"
          echo ">>before<<: $before" 
          echo "$b"
          echo "-------------------"
          echo ">>after - before<<:" 
          echo "$ab"
          
          echo "rama contiene: 'feature'": ${{ contains(steps.getter.outputs.ref, 'feature') }}
          echo "ref empieza con 'refs/heads/'": ${{ startsWith(steps.getter.outputs.ref, 'refs/heads/') }}
          echo "ref endsWith con '/main'": ${{ endsWith(steps.getter.outputs.ref, '/main') }}
          echo "version": ${{ format('Version: {0}.{1}', '1', '2') }}
          result=$(ls -lta ${{github.workspace}})
          echo "-------------------"
          echo "ls -lta 'github.workspace' (${{github.workspace}})" = "$result"