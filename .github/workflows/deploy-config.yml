name: CI/CD Maven - Northflank
on:
  push:
    branches: [main]
    paths:
      - config-server/**
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build y test
        run: |
          cd config-server
          mvn -B package

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Preparar nombre de repositorio en minúsculas
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}
      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v7
        with:
          file: config-server/dockerfile
          context: config-server
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}

