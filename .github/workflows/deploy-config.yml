name: CI/CD Maven - Config
on:
  push:
    branches: [main]
    paths:
      - config-server/**
      - .github/workflows/deploy-config.yml

env:
  NAME: "config"
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write
    outputs:
      DEPLOY_TAG: ${{ steps.deploy-tag.outputs.DEPLOY_TAG }}
    steps:
      - name: Preparar nombre de repositorio en minúsculas
        id: deploy-tag
        run: |
          echo "DEPLOY_TAG=ghcr.io/${GITHUB_REPOSITORY@L}-${{ env.NAME }}:${{ github.sha }}" >> ${GITHUB_ENV}
          echo "DEPLOY_TAG=ghcr.io/${GITHUB_REPOSITORY@L}-${{ env.NAME }}:${{ github.sha }}" >> ${GITHUB_OUTPUT}
          
      - uses: actions/checkout@v6
      
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build y test
        run: |
          cd config-server
          mvn -B package
      
      - name: Login a GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v7
        with:
          file: config-server/Dockerfile
          context: config-server
          push: true
          tags: ${{ env.DEPLOY_TAG }}
          sbom: true
          
      - name: Escanear vulnerabilidades con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DEPLOY_TAG }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Subir resultados de seguridad a GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy en Northflank
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ secrets.NORTHFLANK_PROJECT_CONFIG_ID }}
          image-path: ${{ needs.build.outputs.DEPLOY_TAG }}
          credentials-id: ${{ secrets.NORTHFLANK_CREDENTIALS_ID }}
